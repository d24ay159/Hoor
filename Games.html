
<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            background-color: lightblue;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .button {
            background-color: white;
            color: purple;
            border: none;
            padding: 10px 20px;
            margin: 0 10px;
            cursor: pointer;
            transition: background-color 0.3s, color 0.3s;
        }
        .button:hover {
            background-color: purple;
            color: white;
        }
    </style>
</head>
<body>
    <a href="https://scratch.mit.edu/projects/984066862" class="button">لعبة السيارت</a>
    <a href="https://scratch.mit.edu/projects/997600211" class="button">لعبة الصبار</a>
</body>
</html>
