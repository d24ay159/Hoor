<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            background-color: lightblue;
            text-align: center;
        }
        .button {
            background-color: white;
            color: purple;
            border: none;
            padding: 10px 20px;
            margin: 10px;
            cursor: pointer;
            transition: background-color 0.3s, color 0.3s;
        }
        .button:hover {
            background-color: purple;
            color: white;
        }
    </style>
</head>
<body>
    <button class="button" onclick="window.location.href='https://scratch.mit.edu/projects/984066862'">لعبة السيارت</button>
    <button class="button" onclick="window.location.href='https://scratch.mit.edu/projects/997600211'">لعبة الصبار</button>
</body>
</html>
