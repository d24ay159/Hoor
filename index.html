<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background-color: #FFC0CB; /* زهري فاتح */
            font-family: Arial, sans-serif;
            text-align: center;
        }
        h1 {
            color: #000; /* أسود */
        }
        .button {
            display: inline-block;
            padding: 10px 20px;
            margin: 10px;
            border: 2px solid #FFF; /* أبيض */
            background-color: #000; /* أسود */
            color: #FFF; /* أبيض */
            cursor: pointer;
            transition: background-color 0.3s, color 0.3s;
        }
        .button:hover {
            background-color: #00F; /* أزرق */
            color: #FFF; /* أبيض */
        }
    </style>
</head>
<body>
    <h1>! أهلاً و مرحبا بك</h1>
    <div class="button"><a href="Games.html" style="text-decoration: none; color: #FFF;">ألعاب</a></div>
    <div class="button">تعليمية</div>
    <div class="button">أسئلة</div>
</body>
</html>
