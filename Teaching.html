<!DOCTYPE html>
<html>
<head>
    <title>صفحة تعليمية</title>
    <style>
        body {
            background-color: #1de9b6;
            text-align: center;
        }
        .button {
            background-color: #1de9b6;
            color: #1de9b6;
            border: 2px solid #000;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            transition: border-color 0.3s;
        }
        .button:hover {
            border-color: #000;
        }
        .button-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 50px;
        }
    </style>
</head>
<body>
    <div class="button-container">
        <a href="https://scratch.mit.edu/projects/1031407408" class="button">حروف الهجاء ( للأطفال )</a>
        <a href="https://scratch.mit.edu/projects/989027332" class="button">درس محرك الثورة الخضراء</a>
    </div>
</body>
</html>
