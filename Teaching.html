<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            background-color: #1de9b6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .button {
            background-color: #ffffff;
            color: #1de9b6;
            border: 2px solid transparent;
            border-radius: 5px;
            padding: 10px 20px;
            font-size: 16px;
            margin: 10px;
            cursor: pointer;
            transition: border-color 0.3s;
        }
        .button:hover {
            border-color: #000000;
        }
    </style>
</head>
