<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background-color: #1de9b6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .button {
            background-color: white;
            color: #1de9b6;
            border: 2px solid transparent;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            transition: border-color 0.3s;
        }
        .button:hover {
            border-color: black;
        }
        .button-container {
            display: flex;
            gap: 20px;
        }
    </style>
</head>
<body>
    <div class="button-container">
        <a href="https://scratch.mit.edu/projects/1031407408" class="button">حروف الهجاء (للأطفال)</a>
        <a href="https://scratch.mit.edu/projects/989027332" class="button">درس محرك الثورة الخضراء</a>
    </div>
</body>
</html>
