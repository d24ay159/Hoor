<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>أسئلة</title>
    <style>
        body {
            background-color: #ff8a80;
            text-align: center;
        }
        .button-container {
            display: flex;
            justify-content: center;
            align-items: center; /* توسيط عمودي */
            gap: 20px;
            margin-top: 20px;
        }
        .button {
            background-color: white;
            color: black;
            border: 2px solid white;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            transition: border-color 0.3s;
        }
        .button:hover {
            border-color: black;
        }
    </style>
</head>
<body>
    <div class="button-container">
        <a href="https://scratch.mit.edu/projects/989025899" class="button">أسئلة عن اللبنات البرمجية في سكراتش</a>
        <a href="https://scratch.mit.edu/projects/985308326" class="button">أسئلة عن درس الجهاز العصبي</a>
    </div>
</body>
</html>
