<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>أسئلة</title>
    <style>
        body {
            background-color: #ff8a80;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .button {
            display: inline-block;
            margin: 0 10px;
            padding: 10px 20px;
            background-color: #ffffff;
            color: #000000;
            text-decoration: none;
            border: 1px solid transparent;
            transition: border-color 0.3s;
        }
        .button:hover {
            border: 1px solid #000000;
        }
    </style>
</head>
<body>
    <a class="button" href="https://scratch.mit.edu/projects/989025899">أسئلة عن اللبنات البرمجية في سكراتش</a>
    <a class="button" href="https://scratch.mit.edu/projects/985308326">أسئلة عن درس الجهاز العصبي</a>
</body>
</html>
